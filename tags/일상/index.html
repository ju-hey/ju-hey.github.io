<script>
document.addEventListener('DOMContentLoaded', function() {
  const masthead = document.querySelector('.masthead');
  if (!masthead) return;

  let isHidden = false;
  let hideTimer = null;

  const showHeader = () => {
    if (isHidden) {
      masthead.classList.remove('is-hidden');
      isHidden = false;
    }
  };

  const hideHeader = () => {
    if (!isHidden && window.scrollY > 50) {
      masthead.classList.add('is-hidden');
      isHidden = true;
    }
  };

  const resetHideTimer = () => {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      hideHeader();
    }, 2000);
  };

  window.addEventListener('scroll', () => {
    showHeader();
    if (window.scrollY > 50) {
      resetHideTimer();
    } else {
      clearTimeout(hideTimer);
    }
  }, { passive: true });

  document.addEventListener('mousemove', (e) => {
    if (e.clientY <= 30) {
      showHeader();
      if (window.scrollY > 50) resetHideTimer();
    }
  });

  masthead.addEventListener('mouseenter', () => {
    clearTimeout(hideTimer);
    showHeader();
  });
  masthead.addEventListener('mouseleave', () => {
    if (window.scrollY > 50) resetHideTimer();
  });
});
</script>
